name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo +1.86.0 build --release
    - uses: actions/upload-artifact@v4.6.1
      with: 
        path: ./target/release/
